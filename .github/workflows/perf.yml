name: perf

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"

jobs:
  perf:
    uses: HerrEmil/perf-config/.github/workflows/perf.yml@v1
    with:
      site_dir: dist
      build_cmd: bash scripts/build-dist.sh
      tier: game
      package_manager: npm
      node_version: "20"
